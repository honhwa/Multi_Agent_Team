name: Regression CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Compile Python files
        run: python -m compileall app scripts

      - name: Check frontend script syntax
        run: node --check app/static/app.js

      - name: Run pytest suite
        run: pytest -q tests

      - name: Run minimal Agent OS demo smoke
        run: python scripts/demo_minimal_agent_os.py --check

      - name: Run regression eval harness
        run: mkdir -p artifacts/evals && python scripts/run_evals.py --cases evals/gate_cases.json --output artifacts/evals/regression-summary.json

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-evals
          path: artifacts/evals
